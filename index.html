<!DOCTYPE html>
<html lang="zh-CN">

<head>
  <meta charset="UTF-8">
  <link rel="icon" type="image/svg+xml" href="http://blog.siky.top/balloon.svg">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <meta http-equiv="X-UA-Compatible" content="ie=edge">
  <meta name="keywords" content="siky,siky hub,SIKY,博客,个人,BLOG">
  <meta name="description" content="SIKY Hub - 个人技术与创意中心">
  <meta name="robots" content="all">
  <title>SIKY HUB</title>

  <style>
    :root {
      --yellow: #E6B800;
      --blue: #00A8D9;
      --white: #F0F0F0;
      --bg: #0077CC;
    }

    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    body {
      min-height: 100vh;
      background-color: var(--bg);
      font-family: 'Courier New', 'SF Mono', 'Menlo', monospace;
      color: var(--white);
      overflow-x: hidden;
    }

    /* 背景装饰 */
    .bg-decor {
      position: fixed;
      top: 0;
      left: 0;
      width: 100%;
      height: 100%;
      pointer-events: none;
      z-index: 0;
      overflow: hidden;
    }

    /* 菱形 - 大小错落 */
    .diamond {
      position: absolute;
      border: 6px solid rgba(240, 240, 240, 0.15);
      transform: rotate(45deg);
    }

    .diamond-1 { width: 30px; height: 30px; top: 8%; left: 72%; animation: moveRange1 12s ease-in-out infinite; }
    .diamond-2 { width: 60px; height: 60px; top: 55%; left: 15%; animation: moveRange2 16s ease-in-out infinite 2s; }
    .diamond-3 { width: 100px; height: 100px; top: 32%; left: 88%; animation: moveRange3 20s ease-in-out infinite 1s; }
    .diamond-4 { width: 45px; height: 45px; top: 78%; left: 42%; animation: moveRange1 14s ease-in-out infinite 3s; }
    .diamond-5 { width: 150px; height: 150px; top: 12%; left: 8%; animation: moveRange2 18s ease-in-out infinite 4s; }

    /* 圆形 - 大小错落 */
    .circle {
      position: absolute;
      border: 6px solid rgba(240, 240, 240, 0.12);
      border-radius: 50%;
    }

    .circle-1 { width: 40px; height: 40px; top: 82%; left: 28%; animation: moveRange2 10s ease-in-out infinite; }
    .circle-2 { width: 80px; height: 80px; top: 45%; left: 52%; animation: moveRange3 14s ease-in-out infinite 1s; }
    .circle-3 { width: 120px; height: 120px; top: 20%; left: 35%; animation: moveRange1 12s ease-in-out infinite 2s; }
    .circle-4 { width: 50px; height: 50px; top: 68%; left: 82%; animation: moveRange2 16s ease-in-out infinite 3s; }

    /* 三角形 - 大小错落 */
    .triangle {
      position: absolute;
      width: 0;
      height: 0;
      border-left: solid transparent;
      border-right: solid transparent;
      border-bottom: solid rgba(230, 184, 0, 0.15);
    }

    .triangle-1 { border-left-width: 18px; border-right-width: 18px; border-bottom-width: 30px; top: 42%; left: 5%; animation: moveRange3 15s ease-in-out infinite; }
    .triangle-2 { border-left-width: 35px; border-right-width: 35px; border-bottom-width: 60px; top: 88%; left: 68%; animation: moveRange1 18s ease-in-out infinite 2s; }
    .triangle-3 { border-left-width: 50px; border-right-width: 50px; border-bottom-width: 85px; top: 5%; left: 48%; animation: moveRange2 12s ease-in-out infinite 4s; }

    /* 方块 - 大小错落 */
    .square {
      position: absolute;
      border: 6px solid rgba(240, 240, 240, 0.12);
    }

    .square-1 { width: 25px; height: 25px; top: 60%; left: 75%; animation: squareMove1 14s linear infinite; }
    .square-2 { width: 70px; height: 70px; top: 25%; left: 62%; animation: squareMove2 20s linear infinite; }
    .square-3 { width: 110px; height: 110px; top: 48%; left: 22%; animation: squareMove3 16s linear infinite; }

    /* 横线 */
    .line-decor {
      position: absolute;
      height: 4px;
      background: rgba(240, 240, 240, 0.1);
    }

    .line-decor-1 { width: 100px; top: 28%; left: 0; animation: slideRight 12s linear infinite; }
    .line-decor-2 { width: 150px; top: 58%; right: 0; animation: slideLeft 16s linear infinite; }
    .line-decor-3 { width: 80px; top: 92%; left: 0; animation: slideRight 20s linear infinite 4s; }

    /* 移动范围动画 */
    @keyframes moveRange1 {
      0%, 100% { transform: rotate(0deg) translate(0, 0); }
      25% { transform: rotate(90deg) translate(40px, -30px); }
      50% { transform: rotate(180deg) translate(0, -50px); }
      75% { transform: rotate(270deg) translate(-40px, -20px); }
    }

    @keyframes moveRange2 {
      0%, 100% { transform: rotate(0deg) translateY(0) translateX(0); }
      25% { transform: rotate(90deg) translateY(-40px) translateX(30px); }
      50% { transform: rotate(180deg) translateY(-20px) translateX(-40px); }
      75% { transform: rotate(270deg) translateY(30px) translateX(20px); }
    }

    @keyframes moveRange3 {
      0%, 100% { transform: rotate(0deg) translateY(0) translateX(0); }
      33% { transform: rotate(120deg) translateY(-60px) translateX(-40px); }
      66% { transform: rotate(240deg) translateY(40px) translateX(50px); }
    }

    /* 方块专用 - 持续旋转+移动 */
    @keyframes squareMove1 {
      0% { transform: rotate(0deg) translate(0, 0); }
      25% { transform: rotate(90deg) translate(40px, -30px); }
      50% { transform: rotate(180deg) translate(0, -50px); }
      75% { transform: rotate(270deg) translate(-40px, -20px); }
      100% { transform: rotate(360deg) translate(0, 0); }
    }

    @keyframes squareMove2 {
      0% { transform: rotate(0deg) translateY(0) translateX(0); }
      33% { transform: rotate(120deg) translateY(-60px) translateX(-40px); }
      66% { transform: rotate(240deg) translateY(40px) translateX(50px); }
      100% { transform: rotate(360deg) translateY(0) translateX(0); }
    }

    @keyframes squareMove3 {
      0% { transform: rotate(0deg) translateY(0) translateX(0); }
      25% { transform: rotate(90deg) translateY(-40px) translateX(30px); }
      50% { transform: rotate(180deg) translateY(-20px) translateX(-40px); }
      75% { transform: rotate(270deg) translateY(30px) translateX(20px); }
      100% { transform: rotate(360deg) translateY(0) translateX(0); }
    }

    @keyframes slideRight {
      from { transform: translateX(-200px); }
      to { transform: translateX(calc(100vw + 200px)); }
    }

    @keyframes slideLeft {
      from { transform: translateX(calc(100vw + 200px)); }
      to { transform: translateX(-200px); }
    }

    /* 主内容区 */
    .main-content {
      position: relative;
      z-index: 1;
      display: flex;
      flex-direction: column;
      align-items: center;
      min-height: 100vh;
      padding: 60px 40px;
      max-width: 1100px;
      margin: 0 auto;
    }

    /* 标题 */
    .site-title {
      font-size: 5rem;
      font-weight: 900;
      color: var(--white);
      letter-spacing: 12px;
      margin-bottom: 60px;
      text-align: center;
    }

    .title-line {
      width: 100%;
      height: 8px;
      background: var(--yellow);
      margin-bottom: 60px;
    }

    /* 一言区 */
    .quote-section {
      width: 100%;
      margin-bottom: 50px;
    }

    .quote-box {
      position: relative;
      border: 5px solid var(--white);
      background: rgba(240, 240, 240, 0.08);
      padding: 50px 60px;
      height: 300px;
      display: flex;
      flex-direction: column;
      justify-content: center;
      align-items: center;
    }

    .quote-box::before {
      content: '';
      position: absolute;
      top: -5px;
      left: -5px;
      width: 0;
      height: 0;
      border-style: solid;
      border-width: 0 0 55px 55px;
      border-color: transparent transparent var(--yellow) transparent;
    }

    .quote-box::after {
      content: '';
      position: absolute;
      bottom: -5px;
      right: -5px;
      width: 35px;
      height: 35px;
      background: var(--blue);
    }

    #text {
      font-size: 3.2rem;
      line-height: 1.5;
      color: var(--white);
      font-weight: 900;
      letter-spacing: 3px;
      text-align: center;
      max-height: 200px;
      overflow: hidden;
      display: flex;
      align-items: center;
      justify-content: center;
      transition: opacity 0.3s ease;
    }

    #author {
      color: var(--blue);
      font-size: 1.3rem;
      font-weight: 700;
      margin-top: 25px;
      transition: opacity 0.3s ease;
    }

    /* 卡片行 */
    .cards-row {
      display: flex;
      gap: 30px;
      width: 100%;
      margin-bottom: 15px;
    }

    .card {
      position: relative;
      display: block;
      text-decoration: none;
      color: var(--white);
      padding: 35px 40px 30px;
      border: 5px solid;
      background: rgba(240, 240, 240, 0.1);
      transition: all 0.3s ease;
      overflow: hidden;
    }

    .card-wide { flex: 0 0 55%; }
    .card-narrow { flex: 0 0 calc(45% - 30px); }

    .card::before {
      content: '';
      position: absolute;
      top: 0;
      right: 0;
      width: 0;
      height: 0;
      border-style: solid;
      border-width: 0 40px 40px 0;
      z-index: 2;
    }

    .card::after {
      content: '';
      position: absolute;
      bottom: 18px;
      right: 18px;
      width: 14px;
      height: 14px;
      transition: all 0.3s ease;
    }

    .card h3 {
      font-size: 1.8rem;
      font-weight: 900;
      margin-bottom: 10px;
      letter-spacing: 4px;
    }

    .card p {
      font-size: 1rem;
      opacity: 0.85;
      margin-bottom: 0;
    }

    .arrow {
      position: absolute;
      right: 35px;
      top: 50%;
      transform: translateY(-50%);
      font-size: 1.5rem;
      opacity: 0;
      transition: all 0.3s ease;
    }

    .card:hover .arrow { opacity: 1; }

    .card.yellow {
      border-color: var(--yellow);
      background: rgba(230, 184, 0, 0.12);
    }

    .card.yellow::before {
      border-color: transparent var(--yellow) transparent transparent;
    }

    .card.yellow::after {
      background: var(--yellow);
    }

    .card.yellow h3 {
      color: var(--yellow);
    }

    .card.yellow:hover {
      background: rgba(230, 184, 0, 0.18);
      transform: translateY(-8px);
    }

    .card.yellow:hover .arrow {
      color: var(--yellow);
      transform: translateY(-50%) translateX(8px);
    }

    .card.blue {
      border-color: var(--white);
      background: rgba(240, 240, 240, 0.1);
    }

    .card.blue::before {
      border-color: transparent var(--white) transparent transparent;
    }

    .card.blue::after {
      background: var(--blue);
    }

    .card.blue h3 {
      color: var(--white);
    }

    .card.blue:hover {
      background: rgba(240, 240, 240, 0.18);
      transform: translateY(-8px);
    }

    .card.blue:hover .arrow {
      color: var(--white);
      transform: translateY(-50%) translateX(8px);
    }

    .lines-row {
      display: flex;
      gap: 30px;
      width: 100%;
      margin-bottom: 30px;
    }

    .line { height: 5px; }

    .line-yellow {
      background: var(--yellow);
    }

    .line-white {
      background: rgba(240, 240, 240, 0.5);
    }

    .bottom-decor {
      display: flex;
      justify-content: center;
      width: 100%;
      padding: 40px 0 20px;
      margin-top: auto;
    }

    .hex-decor {
      font-size: 0.9rem;
      color: var(--white);
      opacity: 0.5;
      letter-spacing: 5px;
    }

    /* 弹窗样式 */
    .modal-overlay {
      display: none;
      position: fixed;
      top: 0;
      left: 0;
      width: 100%;
      height: 100%;
      background: rgba(0, 50, 100, 0.85);
      z-index: 1000;
      justify-content: center;
      align-items: center;
    }

    .modal-overlay.active {
      display: flex;
    }

    .modal-content {
      background: var(--bg);
      border: 5px solid var(--white);
      padding: 40px;
      text-align: center;
      position: relative;
      max-width: 400px;
    }

    .modal-content::before {
      content: '';
      position: absolute;
      top: -5px;
      left: -5px;
      width: 0;
      height: 0;
      border-style: solid;
      border-width: 0 0 40px 40px;
      border-color: transparent transparent var(--yellow) transparent;
    }

    .modal-content::after {
      content: '';
      position: absolute;
      bottom: -5px;
      right: -5px;
      width: 25px;
      height: 25px;
      background: var(--blue);
    }

    .modal-qr {
      width: 200px;
      height: 200px;
      margin-bottom: 20px;
      border: 3px solid var(--white);
    }

    .modal-text {
      font-size: 1rem;
      color: var(--white);
      font-weight: 700;
    }

    .modal-close {
      position: absolute;
      top: 15px;
      right: 20px;
      font-size: 1.5rem;
      color: var(--white);
      cursor: pointer;
      background: none;
      border: none;
      font-weight: 900;
    }

    .modal-close:hover {
      color: var(--yellow);
    }

    @keyframes fadeInUp {
      from { opacity: 0; transform: translateY(30px); }
      to { opacity: 1; transform: translateY(0); }
    }

    @keyframes slideInLeft {
      from { opacity: 0; transform: translateX(-40px); }
      to { opacity: 1; transform: translateX(0); }
    }

    @keyframes slideInRight {
      from { opacity: 0; transform: translateX(40px); }
      to { opacity: 1; transform: translateX(0); }
    }

    .site-title, .title-line {
      opacity: 0;
      animation: fadeInUp 0.6s ease forwards;
    }

    .title-line { animation-delay: 0.15s; }
    .quote-section { opacity: 0; animation: fadeInUp 0.7s ease forwards 0.3s; }

    .cards-row:nth-child(3) .card:nth-child(1) {
      opacity: 0;
      animation: slideInLeft 0.6s ease forwards 0.5s;
    }

    .cards-row:nth-child(3) .card:nth-child(2) {
      opacity: 0;
      animation: slideInRight 0.6s ease forwards 0.6s;
    }

    .cards-row:nth-child(5) .card:nth-child(1) {
      opacity: 0;
      animation: slideInLeft 0.6s ease forwards 0.7s;
    }

    .cards-row:nth-child(5) .card:nth-child(2) {
      opacity: 0;
      animation: slideInRight 0.6s ease forwards 0.8s;
    }

    @media (max-width: 768px) {
      .main-content { padding: 40px 20px; }
      .site-title { font-size: 3rem; letter-spacing: 6px; }
      .quote-box { height: 240px; padding: 35px 30px; }
      #text { font-size: 2rem; }
      .cards-row { flex-direction: column; gap: 20px; }
      .card-wide, .card-narrow { flex: none; width: 100%; }
      .lines-row { flex-direction: column; gap: 20px; }
      .line { width: 100% !important; }
      .card h3 { font-size: 1.4rem; }
    }
  </style>
</head>

  <script>
    function updateHitokoto() {
      fetch('https://v1.hitokoto.cn')
        .then(res => res.json())
        .then(data => {
          const { hitokoto, from, from_who } = data;
          const textEl = document.getElementById('text');
          const authorEl = document.getElementById('author');
          
          textEl.style.opacity = '0';
          authorEl.style.opacity = '0';
          
          setTimeout(() => {
            textEl.innerHTML = hitokoto;
            authorEl.innerHTML = `—— ${from_who ? from_who : ''}「${from}」`;
            textEl.style.opacity = '1';
            authorEl.style.opacity = '1';
          }, 300);
        });
    }

    function openModal() {
      document.getElementById('qrModal').classList.add('active');
    }

    function closeModal() {
      document.getElementById('qrModal').classList.remove('active');
    }

    document.getElementById('qrModal').addEventListener('click', function(e) {
      if (e.target === this) {
        closeModal();
      }
    });

    updateHitokoto();
    setInterval(updateHitokoto, 10000);
  </script>
